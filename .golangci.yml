run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        disabled: true
  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch

issues:
  exclude-dirs:
    - example
    - example_docker
    - functional_test
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - revive
