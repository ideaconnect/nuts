services:
  nats:
    image: nats:2.12-alpine
    container_name: nuts-docker-nats
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  # Init container to create the JetStream stream
  nats-init:
    image: natsio/nats-box:0.19.0
    container_name: nuts-docker-nats-init
    depends_on:
      nats:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        nats -s nats://nats:4222 stream add EVENTS \
          --subjects "events.>" \
          --storage memory \
          --retention limits \
          --max-msgs 10000 \
          --max-age 1h \
          --discard old \
          --defaults
        echo "Stream EVENTS created successfully"
    restart: "no"

  nuts:
    image: idcttech/nuts:latest
    container_name: nuts-docker-server
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/app/Caddyfile:ro
      - ./index.html:/srv/static/index.html:ro
    depends_on:
      nats-init:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  # PHP sender: publishes random numbers and letters every 50ms
  php-sender:
    image: composer:2
    container_name: nuts-docker-php-sender
    working_dir: /app
    volumes:
      - ./composer.json:/app/composer.json:ro
      - ./sender.php:/app/sender.php:ro
      - php-vendor:/app/vendor
    environment:
      - NATS_HOST=nats
      - NATS_PORT=4222
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        composer install --no-interaction --quiet
        php /app/sender.php
    depends_on:
      nats-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  nats-data:
  php-vendor:
