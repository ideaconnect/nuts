version: 2

project_name: nuts

before:
  hooks:
    - go mod tidy

builds:
  - id: caddy-nuts
    main: ./cmd/caddy
    binary: caddy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/caddyserver/caddy/v2.CustomVersion={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - Caddyfile

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: ideaconnect
    name: nuts
  draft: false
  prerelease: auto
  name_template: "NUTS {{.Version}}"
  header: |
    ## NUTS {{ .Version }}

    A pre-built Caddy binary that includes the `nuts` NATS-to-SSE handler.
    See [CHANGELOG.md](CHANGELOG.md) for the full list of changes.
  footer: |
    ---
    Docker image: `docker pull idcttech/nuts:{{ .Version }}`
